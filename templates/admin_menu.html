{% extends "base.html" %}

{% block content %}
<div class="min-h-screen admin-bg-elegant py-24 px-8">
    <div class="max-w-7xl mx-auto">
        
        <div class="mb-12 flex justify-between items-end">
            <div>
                <span class="text-orange-600 font-black tracking-[0.4em] text-[10px] uppercase block mb-4">Inventory Control</span>
                <h1 class="text-5xl font-black text-white uppercase tracking-tighter">Menu <span class="italic font-serif font-light text-orange-600 lowercase">Editor</span></h1>
            </div>
            <p class="text-stone-400 text-[10px] font-bold uppercase tracking-widest pb-2">Total Items: {{ items|length }}</p>
        </div>

        <div class="grid grid-cols-1 gap-6">
            {% for item in items %}
            <div class="bg-white/90 backdrop-blur-md p-6 rounded-3xl border border-white/20 shadow-xl hover:shadow-2xl transition-all">
               <form action="{{ url_for('update_menu_item', id=item.id) }}" method="POST" class="flex flex-wrap lg:flex-nowrap items-center gap-8">
                    
                    <div class="relative w-20 h-20 flex-shrink-0">
                        <img src="{{ item.image_url }}" class="w-full h-full object-cover rounded-2xl {% if not item.is_available %}grayscale opacity-30{% endif %}">
                        {% if not item.is_available %}
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="bg-stone-900 text-white text-[7px] font-black px-2 py-1 rounded-md uppercase tracking-tighter">Out</span>
                        </div>
                        {% endif %}
                    </div>

                    <div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="space-y-1">
                            <label class="text-[9px] font-black uppercase tracking-widest text-stone-400">Dish Name</label>
                            <input type="text" name="name" value="{{ item.name }}" class="w-full text-sm font-black uppercase border-b border-stone-200 focus:outline-none bg-transparent py-1">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-black uppercase tracking-widest text-stone-400">Category</label>
                            <input type="text" name="category" value="{{ item.category }}" class="w-full text-sm font-black text-orange-600 border-b border-stone-200 focus:outline-none bg-transparent py-1">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-black uppercase tracking-widest text-stone-400">Price</label>
                            <input type="number" step="0.01" name="price" value="{{ item.price }}" class="w-full text-sm font-mono border-b border-stone-200 focus:outline-none bg-transparent py-1">
                        </div>
                    </div>

                    <div class="flex items-center gap-6">
                        <div class="flex flex-col items-center">
                            <span class="text-[8px] font-black uppercase text-stone-400 mb-2">In Stock</span>
                            <input type="checkbox" name="is_available" {% if item.is_available %}checked{% endif %} class="w-5 h-5 accent-green-600">
                        </div>
                        <button type="submit" class="bg-stone-900 text-white px-6 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-orange-600 transition-all">
                            Update
                        </button>
                    </div>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
