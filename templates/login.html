{% extends "base.html" %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center px-4 bg-stone-900">
    <div class="max-w-md w-full bg-white rounded-[3.5rem] p-10 md:p-16 shadow-2xl reveal relative overflow-hidden">
        
        <div class="text-center mb-10">
            <span class="text-orange-600 uppercase tracking-[0.5em] text-[10px] font-black mb-4 block">Secure Portal</span>
            <h2 class="text-4xl font-black text-stone-900 leading-tight">Admin <span class="italic font-serif font-light text-orange-600">Login</span></h2>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="bg-red-50 text-red-500 text-[11px] font-bold uppercase tracking-wider p-4 rounded-xl mb-6 text-center border border-red-100">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="text-[10px] uppercase tracking-widest font-black text-stone-400 block mb-2 ml-1">Username</label>
                <input type="text" name="username" required 
                       class="w-full bg-stone-50 border border-stone-100 rounded-2xl px-6 py-4 focus:border-orange-600 outline-none transition-all text-stone-800 font-medium">
            </div>

            <div>
                <label class="text-[10px] uppercase tracking-widest font-black text-stone-400 block mb-2 ml-1">Password</label>
                <input type="password" name="password" required 
                       class="w-full bg-stone-50 border border-stone-100 rounded-2xl px-6 py-4 focus:border-orange-600 outline-none transition-all text-stone-800 font-medium">
            </div>

            <button type="submit" class="w-full bg-stone-900 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-[10px] hover:bg-orange-600 transition-all shadow-xl shadow-stone-200">
                Authenticate
            </button>
        </form>

        <div class="mt-10 text-center">
            <a href="/" class="text-[10px] font-black text-stone-300 hover:text-orange-600 uppercase tracking-widest transition-colors">
                ← Back to Site
            </a>
        </div>
    </div>
</section>
{% endblock %}
