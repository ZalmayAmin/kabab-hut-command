{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-16">
    <div class="mb-8">
        <a href="/admin/requests" class="text-stone-500 hover:text-orange-600 transition text-sm font-medium flex items-center gap-2">
            ← Back to Dashboard
        </a>
        <h1 class="text-4xl font-bold text-stone-900 mt-4">Add New Menu Item</h1>
        <p class="text-stone-500">Expand your menu by adding a new dish to the collection.</p>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-xl border border-stone-100">
        <form action="/admin/add-menu" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-2 text-stone-700">Dish Name</label>
                    <input type="text" name="name" required placeholder="e.g., Seekh Kabab"
                           class="w-full p-4 rounded-xl border border-stone-200 focus:ring-2 focus:ring-orange-500 focus:bg-orange-50/30 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-stone-700">Price ($)</label>
                    <input type="number" step="0.01" name="price" required placeholder="14.99"
                           class="w-full p-4 rounded-xl border border-stone-200 focus:ring-2 focus:ring-orange-500 focus:bg-orange-50/30 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-stone-700">Category</label>
                    <select name="category" required 
                            class="w-full p-4 rounded-xl border border-stone-200 focus:ring-2 focus:ring-orange-500 focus:bg-orange-50/30 outline-none transition bg-white">
                        <option value="Appetizers">Appetizers</option>
                        <option value="Grill">Grill</option>
                        <option value="Entrees">Entrees</option>
                        <option value="Vegetarian">Vegetarian</option>
                        <option value="Rice">Rice</option>
                        <option value="Bread">Bread</option>
                        <option value="Drinks">Drinks</option>
                        <option value="Dessert">Dessert</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-stone-700">Description</label>
                <textarea name="description" rows="3" required placeholder="Describe the ingredients and flavors..."
                          class="w-full p-4 rounded-xl border border-stone-200 focus:ring-2 focus:ring-orange-500 focus:bg-orange-50/30 outline-none transition"></textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-stone-700">Image URL (Unsplash)</label>
                <input type="url" name="image_url" required placeholder="https://images.unsplash.com/photo-..."
                       class="w-full p-4 rounded-xl border border-stone-200 focus:ring-2 focus:ring-orange-500 focus:bg-orange-50/30 outline-none transition">
                <p class="text-xs text-stone-400 mt-2">Pro tip: Copy an image link from Unsplash for high-quality visuals.</p>
            </div>

            <div class="flex items-center gap-3 p-4 bg-stone-50 rounded-xl">
                <input type="checkbox" name="is_featured" id="is_featured" value="1"
                       class="w-5 h-5 text-orange-600 border-stone-300 rounded focus:ring-orange-500">
                <label for="is_featured" class="text-sm font-semibold text-stone-700 select-none cursor-pointer">
                    Display as "Chef's Choice" on the menu
                </label>
            </div>

            <button type="submit" class="w-full bg-stone-900 text-white py-5 rounded-2xl font-bold text-xl hover:bg-orange-600 transition transform hover:-translate-y-1 shadow-xl">
                Publish to Menu
            </button>
        </form>
    </div>
</div>
{% endblock %}
