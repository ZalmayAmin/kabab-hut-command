{% extends "base.html" %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-stone-50 pt-20">
    <div class="max-w-md w-full px-8 text-center">
        <div class="mb-8 flex justify-center">
            <div class="w-24 h-24 bg-orange-600 rounded-full flex items-center justify-center shadow-xl shadow-orange-600/20 animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
        </div>

        <h1 class="text-4xl font-black text-stone-900 tracking-tighter mb-4 uppercase">Order Received!</h1>
        <p class="text-[10px] text-stone-400 font-black uppercase tracking-[0.3em]">
    Order #HUT-<span id="display-id">NEW</span>
</p>

        <div class="space-y-4">
            <a href="/" class="block w-full py-4 bg-stone-900 text-white rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-stone-800 transition-all">
                Return Home
            </a>
            <p class="text-[10px] text-stone-400 font-black uppercase tracking-[0.3em]">Order #{{ order_id if order_id else 'HUT-' + range(1000, 9999)|random|string }}</p>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');
    
    if (orderId) {
        // Show the ID on the success page
        document.getElementById('display-id').innerText = orderId;
        
        // Link the "Track My Order" button to our new track route
        const trackBtn = document.getElementById('track-link');
        if (trackBtn) {
            trackBtn.href = '/track/' + orderId;
        }
    }

    // Confetti celebration
    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#ea580c', '#1c1917', '#ffffff'] 
    });
</script>
{% endblock %}
